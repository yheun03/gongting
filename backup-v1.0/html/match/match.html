<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover=cover, user-scalable=no">
    <title>공팅 - 블라인드 매칭 서비스</title>
    <link rel="apple-touch-icon" sizes="57x57" href="/resources/favicon/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/resources/favicon/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/resources/favicon/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/resources/favicon/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/resources/favicon/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/resources/favicon/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/resources/favicon/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/resources/favicon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/resources/favicon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="/resources/favicon/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/resources/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/resources/favicon/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/resources/favicon/favicon-16x16.png">
    <link rel="manifest" href="/resources/favicon/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">
    <meta
        name="한국공학대학교 학생들을 대상으로 하는 블라인드 매칭 서비스입니다."
        content="한국공학대학교 학생들을 대상으로 하는 블라인드 매칭 서비스입니다."
    >
    <link rel="stylesheet" href="/resources/styles/slick.css">
    <link rel="stylesheet" href="/resources/styles/styles.css">
    <script src="/resources/scripts/jquery-2.2.4.min.js"></script>
    <script src="/resources/scripts/slick.min.js"></script>
    <script src="/resources/scripts/scripts.js"></script>
</head>
<body>
    <div class="wrap">
        <header>
            <ul>
                <li><a href=""><img src="/resources/icons/ic-arrow-left.svg" alt=""></a></li>
                <li><span>친구 매칭 신청</span></li>
            </ul>
            <ul>
                <li><a href=""><img src="/resources/icons/ic-close.svg" alt=""></a></li>
            </ul>
        </header>
        <section>
            <div class="setting-dots"></div>
            <div class="setting">
                <div class="setting-step">
                    <p class="page-title">매칭 시 어떤 성별을 원하시나요?</p>
                    <div class="ipt-wrap">
                        <div class="ipt">
                            <div>
                                <label><input type="radio" name="radio2" class="box"><span>남성</span></label>
                                <label><input type="radio" name="radio2" class="box"><span>여성</span></label>
                            </div>
                        </div>
                        <div class="ipt">
                            <div>
                                <label><input type="checkbox" name="checkbox"><span>상관없음</span></label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="setting-step">
                    <p class="page-title">매칭 시 선호하는<br/>나이가 있으신가요?</p>
                    <div class="ipt-wrap">
                        <div class="ipt">
                            <div>
                                <select name="" id="">
                                    <option value="kakao" hidden>나이</option>
                                    <option value="naver">00년생 [25살]</option>
                                    <option value="naver">01년생 [24살]</option>
                                    <option value="naver">02년생 [23살]</option>
                                    <option value="naver">03년생 [22살]</option>
                                    <option value="naver">04년생 [21살]</option>
                                    <option value="naver">05년생 [20살]</option>
                                </select>
                            </div>
                        </div>
                        <div class="ipt">
                            <div>
                                <label><input type="checkbox" name="checkbox"><span>상관없음</span></label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="setting-step">
                    <p class="page-title">선호하는 상대방의<br/>흡연 여부를 선택해주세요</p>
                    <div class="ipt-wrap">
                        <div class="ipt">
                            <div>
                                <label><input type="radio" name="radio2" class="box"><span>흡연자</span></label>
                                <label><input type="radio" name="radio2" class="box"><span>비흡연자</span></label>
                            </div>
                        </div>
                        <div class="ipt">
                            <div>
                                <label><input type="checkbox" name="checkbox"><span>상관없음</span></label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="setting-step">
                    <p class="page-title">선호하는 MBTI를 알려주세요</p>
                    <div class="ipt-wrap">
                        <div class="ipt">
                            <div>
                                <label><input type="radio" name="ei" value="e" class="box"><span>E</span><p>외향형</p></label>
                                <label><input type="radio" name="ei" value="i" class="box"><span>I</span><p>내향형</p></label>
                                <label><input type="radio" name="ns" value="n" class="box"><span>N</span><p>직관형</p></label>
                                <label><input type="radio" name="ns" value="s" class="box"><span>S</span><p>감각형</p></label>
                                <label><input type="radio" name="tf" value="t" class="box"><span>T</span><p>사고형</p></label>
                                <label><input type="radio" name="tf" value="f" class="box"><span>F</span><p>감정형</p></label>
                                <label><input type="radio" name="jp" value="j" class="box"><span>J</span><p>판단형</p></label>
                                <label><input type="radio" name="jp" value="p" class="box"><span>P</span><p>인식형</p></label>
                            </div>
                        </div>
                        <div class="ipt">
                            <div>
                                <label><input type="checkbox" name="checkbox"><span>상관없음</span></label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="setting-step">
                    <p class="page-title">선호하는 상대방의<br/>취미를 선택해 주세요</p>
                    <p class="page-dscpt">최대 5개 선택할 수 있어요.</p>
                    <div class="ipt-wrap">
                        <div class="list tag">
                            <label><input type="checkbox" name="hobby"><span>##</span></label>
                            <label><input type="checkbox" name="hobby"><span>###</span></label>
                            <label><input type="checkbox" name="hobby"><span>#######</span></label>
                            <label><input type="checkbox" name="hobby"><span>####</span></label>
                            <label><input type="checkbox" name="hobby"><span>##</span></label>
                            <label><input type="checkbox" name="hobby"><span>#######</span></label>
                            <label><input type="checkbox" name="hobby"><span>###</span></label>
                            <label><input type="checkbox" name="hobby"><span>####</span></label>
                            <label><input type="checkbox" name="hobby"><span>##</span></label>
                            <label><input type="checkbox" name="hobby"><span>###</span></label>
                            <label><input type="checkbox" name="hobby"><span>#######</span></label>
                            <label><input type="checkbox" name="hobby"><span>##</span></label>
                            <label><input type="checkbox" name="hobby"><span>###</span></label>
                            <label><input type="checkbox" name="hobby"><span>##</span></label>
                            <label><input type="checkbox" name="hobby"><span>#####</span></label>
                            <label><input type="checkbox" name="hobby"><span>####</span></label>
                            <label><input type="checkbox" name="hobby"><span>###</span></label>
                            <label><input type="checkbox" name="hobby"><span>#####</span></label>
                            <label><input type="checkbox" name="hobby"><span>####</span></label>
                            <label><input type="checkbox" name="hobby"><span>#####</span></label>
                            <label><input type="checkbox" name="hobby"><span>###</span></label>
                            <label><input type="checkbox" name="hobby"><span>#######</span></label>
                            <label><input type="checkbox" name="hobby"><span>##</span></label>
                            <label><input type="checkbox" name="hobby"><span>#####</span></label>
                            <label><input type="checkbox" name="hobby"><span>##</span></label>
                            <label><input type="checkbox" name="hobby"><span>###</span></label>
                            <label><input type="checkbox" name="hobby"><span>#######</span></label>
                        </div>
                    </div>
                </div>
                <div class="setting-step">
                    <p class="page-title">선호하는 상대방의<br/>특성을 선택해 주세요</p>
                    <p class="page-dscpt">최대 5개 선택할 수 있어요.</p>
                    <div class="ipt-wrap">
                        <div class="list tag">
                            <label><input type="checkbox" name="distinct"><span>##</span></label>
                            <label><input type="checkbox" name="distinct"><span>###</span></label>
                            <label><input type="checkbox" name="distinct"><span>#######</span></label>
                            <label><input type="checkbox" name="distinct"><span>####</span></label>
                            <label><input type="checkbox" name="distinct"><span>##</span></label>
                            <label><input type="checkbox" name="distinct"><span>#######</span></label>
                            <label><input type="checkbox" name="distinct"><span>###</span></label>
                            <label><input type="checkbox" name="distinct"><span>####</span></label>
                            <label><input type="checkbox" name="distinct"><span>##</span></label>
                            <label><input type="checkbox" name="distinct"><span>###</span></label>
                            <label><input type="checkbox" name="distinct"><span>#######</span></label>
                            <label><input type="checkbox" name="distinct"><span>##</span></label>
                            <label><input type="checkbox" name="distinct"><span>###</span></label>
                            <label><input type="checkbox" name="distinct"><span>##</span></label>
                            <label><input type="checkbox" name="distinct"><span>#####</span></label>
                            <label><input type="checkbox" name="distinct"><span>####</span></label>
                            <label><input type="checkbox" name="distinct"><span>###</span></label>
                            <label><input type="checkbox" name="distinct"><span>#####</span></label>
                            <label><input type="checkbox" name="distinct"><span>####</span></label>
                            <label><input type="checkbox" name="distinct"><span>#####</span></label>
                            <label><input type="checkbox" name="distinct"><span>###</span></label>
                            <label><input type="checkbox" name="distinct"><span>#######</span></label>
                            <label><input type="checkbox" name="distinct"><span>##</span></label>
                            <label><input type="checkbox" name="distinct"><span>#####</span></label>
                            <label><input type="checkbox" name="distinct"><span>##</span></label>
                            <label><input type="checkbox" name="distinct"><span>###</span></label>
                            <label><input type="checkbox" name="distinct"><span>#######</span></label>
                        </div>
                    </div>
                </div>
                <div class="setting-succes">
                    <img src="/resources/icons/ic-match-succes.svg" alt="">
                    <p class="page-title"><b>친구 매칭 신청</b>이<br/>완료되었습니다.</p>
                    <p class="page-dscpt">매칭 결과를 기다려주세요</p>
                </div>
            </div>
        </section>
        <footer>
            <ul>
                <li class="setting-prev">
                    <a href="#" class="btn">이전</a>
                </li>
                <li class="setting-next">
                    <a href="#" class="btn primary">다음</a>
                </li>
            </ul>
        </footer>
    </div>
</body>
</html>

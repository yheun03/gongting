<body>

                    <p class="page-dscpt">상대방과 매칭 시 보여지는 필수항목이예요.</p>
                    <div class="ipt-wrap">
                        <div class="ipt">
                            <div>
                                <select name="" id="">
                                    <option value="kakao" hidden>성별을 선택해주세요</option>
                                    <option value="men">남성</option>
                                    <option value="women">여성</option>
                                </select>
                            </div>
                        </div>
                        <div class="ipt">
                            <div>
                                <select name="" id="">
                                    <option value="kakao" checked hidden>나이를 선택해주세요</option>
                                    <option value="naver">00년생 [25살]</option>
                                    <option value="naver">01년생 [24살]</option>
                                    <option value="naver">02년생 [23살]</option>
                                    <option value="naver">03년생 [22살]</option>
                                    <option value="naver">04년생 [21살]</option>
                                    <option value="naver">05년생 [20살]</option>
                                </select>
                            </div>
                        </div>
                        <div class="ipt">
                            <div>
                                <select name="">
                                    <optgroup label="SW대학">
                                        <option value="">컴퓨터공학부-컴퓨터공학전공</option>

                                    </optgroup>
                                    <optgroup label="IT반도체융햡대학">
                                        <option value="">전자공학부-전자공학전공</option>
                                        <option value="">전자공학부-임베디드시스템전공</option>
                                        <option value="">반도체공학부-나노반도체공학전공</option>
                                        <option value="">반도체공학부-반도체시스템전공</option>
                                    </optgroup>
                                    <optgroup label="스마트기계융합대학">
                                        <option value="">기계공학과</option>
                                        <option value="">기계설계공학부-기계설계전공</option>
                                        <option value="">기계설계공학부-지능형모빌리티전공</option>
                                        <option value="">메카트로닉스공학부-메카트로닉스전공</option>
                                        <option value="">메카트로닉스공학부-AI로봇전공</option>
                                    </optgroup>
                                    <optgroup label="첨단융합대학">
                                        <option value="">신소재공학과</option>
                                        <option value="">생명화학공학과</option>
                                        <option value="">에너지·전기공학부-전력응용시스템전공</option>
                                        <option value="">에너지·전기공학부-미래에너지시스템전공</option>
                                    </optgroup>
                                    <optgroup label="경영학부">
                                        <option value="">경영학전공</option>
                                        <option value="">데이터사이언스경영전공</option>
                                        <option value="">IT경영전공</option>
                                    </optgroup>
                                    <optgroup label="디자인공학부">
                                        <option value="">산업디자인공학전공</option>
                                        <option value="">미디어디자인공학전공</option>
                                    </optgroup>
                                    <optgroup label="미래대학">
                                        <option value="">융합전공</option>
                                        <option value="">자유전공학부</option>
                                    </optgroup>
                                    <optgroup label="기업인재대학">

                                        <option value="">일학습병행학부</option>
                                        <option value="">조기취업학부</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>
                        <div class="ipt">
                            <div>
                                <select name="" id="">
                                    <option value="none" checked hidden>학년을 선택해주세요</option>

                            <div>
                                <select name="" id="">
                                    <option value="" hidden>흡연여부를 선택해주세요</option>
                                    <option value="">흡연</option>
                                    <option value="">비흡연</option>
                                </select>
                            </div>
                        </div>
                        <div class="ipt">
                            <div>
                                <select name="" id="">
                                    <option value="kakao">카카오톡</option>
                                    <option value="naver">네이버</option>
                                </select>
                                <input type="text" placeholder="ID">
                            </div>

                            </div>

                </div>
                <div class="setting-step">
                    <p class="page-title">MBTI를 알려주세요</p>
                    <div class="ipt-wrap">
                        <div class="ipt">
                            <div>
                                <label><input type="radio" name="ei" value="e" class="box"><span>E</span><p>외향형</p></label>
                                <label><input type="radio" name="ei" value="i" class="box"><span>I</span><p>내향형</p></label>
                                <label><input type="radio" name="ns" value="n" class="box"><span>N</span><p>직관형</p></label>
                                <label><input type="radio" name="ns" value="s" class="box"><span>S</span><p>감각형</p></label>
                                <label><input type="radio" name="tf" value="t" class="box"><span>T</span><p>사고형</p></label>
                                <label><input type="radio" name="tf" value="f" class="box"><span>F</span><p>감정형</p></label>
                                <label><input type="radio" name="jp" value="j" class="box"><span>J</span><p>판단형</p></label>
                                <label><input type="radio" name="jp" value="p" class="box"><span>P</span><p>인식형</p></label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="setting-step">
                    <p class="page-title">나의 취미를<br/>선택해 주세요</p>
